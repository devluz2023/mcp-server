# The main pipeline for app2

resources:
  pipelines:
    app2_etl:
      name: app2_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/app2_etl"

      libraries:
        - glob:
            include: ../src/app2_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
