bundle:
  name: docker-poc

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405613152344883.3.azuredatabricks.net/

resources:
  jobs:
    docker_hello_job:
      name: "[${bundle.target}] Hello Docker"
      tasks:
        - task_key: main_task
          new_cluster:
            spark_version: "13.3.x-scala2.12"
            
            # Usando imagem oficial para garantir que o Spark suba
            docker_image:
              url: "databricksruntime/python:latest"
            
            node_type_id: "Standard_DS3_v2"
            num_workers: 0
            spark_conf:
              spark.databricks.cluster.profile: "singleNode"
              spark.master: "local[*]"
            custom_tags:
              ResourceClass: "SingleNode"
            data_security_mode: "SINGLE_USER"

          spark_python_task:
            python_file: ./app.py